<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADS Fintech · Coming Soon</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <!-- Main Container -->
    <div class="container">
        <!-- Logo Section -->
        <div class="logo-container">
            <img src="assets/images/logo.png" alt="ADS Fintech Logo" class="logo" onerror="this.src='https://via.placeholder.com/200x80/1a2a3a/ffffff?text=ADS+FINTECH'">
        </div>

        <!-- Countdown Headline -->
        <h1 class="headline">
            <span class="headline-main">ADS FINTECH PLATFORM LAUNCH</span>
            <span class="headline-sub">COUNTDOWN</span>
        </h1>

        <!-- Countdown Timer -->
        <div class="countdown" id="countdown">
            <div class="countdown-item">
                <span class="countdown-number" id="days">00</span>
                <span class="countdown-label">Days</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="hours">00</span>
                <span class="countdown-label">Hours</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="minutes">00</span>
                <span class="countdown-label">Minutes</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="seconds">00</span>
                <span class="countdown-label">Seconds</span>
            </div>
        </div>

        <!-- Main Message -->
        <div class="message-box">
            <p class="message">We are currently undergoing a scheduled revamp to serve you better. We'll go-live soon</p>
        </div>

        <!-- Contact Information -->
        <div class="contact-section">
            <h2 class="contact-title">Contact Us</h2>
            
            <div class="contact-grid">
                <!-- Admin -->
                <div class="contact-card">
                    <div class="contact-icon">
                        <i class="fa-regular fa-user"></i>
                    </div>
                    <div class="contact-label">Admin</div>
                </div>

                <!-- Email 1 -->
                <div class="contact-card">
                    <div class="contact-icon">
                        <i class="fa-regular fa-envelope"></i>
                    </div>
                    <a href="mailto:ads2025fintech@gmail.com" class="contact-link">ads2025fintech@gmail.com</a>
                </div>

                <!-- Email 2 -->
                <div class="contact-card">
                    <div class="contact-icon">
                        <i class="fa-regular fa-envelope"></i>
                    </div>
                    <a href="mailto:tngqalo@gmail.com" class="contact-link">tngqalo@gmail.com</a>
                </div>

                <!-- Phone -->
                <div class="contact-card">
                    <div class="contact-icon">
                        <i class="fa-regular fa-phone"></i>
                    </div>
                    <a href="tel:+2782658244709" class="contact-link">065 8244 709</a>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>&copy; 2026 ADS Fintech. All rights reserved.</p>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="assets/js/main.js"></script>
</body>
</html>
